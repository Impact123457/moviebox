name: Cypress E2E

on:
  push:
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      AUTH_GITHUB_ID: ${{ secrets.AUTH_GITHUB_ID }}
      AUTH_GITHUB_SECRET: ${{ secrets.AUTH_GITHUB_SECRET }}
      NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
      NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
      SANITY_WRITE_TOKEN: ${{ secrets.SANITY_WRITE_TOKEN }}
      NEXT_PUBLIC_SANITY_API_VERSION: ${{ secrets.NEXT_PUBLIC_SANITY_API_VERSION }}
      NEXTAUTH_URL: ${{secrets.NEXTAUTH_URL}}
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
            node-version: 20.9.0
            cache: npm

      - name: Verify required envs
        run: |
          for v in NEXTAUTH_URL NEXT_PUBLIC_SANITY_PROJECT_ID NEXT_PUBLIC_SANITY_DATASET SANITY_WRITE_TOKEN AUTH_SECRET; do
            if [ -z "${!v}" ]; then
              echo "MISSING: $v"
            else
              echo "SET: $v"
            fi
          done

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Start Next.js (background, log file)
        run: |
          nohup npm run start > app.log 2>&1 &
          PID=$!
          echo "Started next start as PID $PID"
          npx wait-on http://localhost:3000
          # lightly tail during run so logs stream into Actions output (optional)
          (sleep 1; tail -f app.log) &
        # keep the job alive and let Cypress run against the server

      - name: Run Cypress
        run: |
          set -o pipefail
          npm run test:e2e || EXIT_CODE=$?
          if [ -n "$EXIT_CODE" ]; then
            echo "Cypress failed with code $EXIT_CODE - printing last 400 lines of app.log"
            tail -n 400 app.log || true
            exit $EXIT_CODE
          fi

      - name: Start Next.js
        run: npm run start &

      - name: Wait for app
        run: npx wait-on http://localhost:3000

      - name: Run Cypress
        run: npm run test:e2e
